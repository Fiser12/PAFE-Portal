services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules:delegated
    command: sleep infinity
    environment:
      NODE_ENV: development
      # En la red bridge PostgreSQL vive en el servicio `devcontainer_db`.
      # Se fija aquí para que un .env.local antiguo con localhost no restaure
      # accidentalmente la dependencia de network_mode: host.
      DATABASE_URL: postgresql://devuser:devsecret@devcontainer_db:5432/devcontainer_db
    env_file:
      - .devcontainer.env
    depends_on:
      devcontainer_db:
        condition: service_healthy
    expose:
      - "3000"
      - "6006"
    networks:
      - default_network

  devcontainer_db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - ../.docker/devcontainer_postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=devsecret
      - POSTGRES_USER=devuser
      - POSTGRES_DB=devcontainer_db
    expose:
      - "5432"
    networks:
      - default_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U devuser -d devcontainer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  node_modules:

networks:
  default_network:
    driver: bridge
